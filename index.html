<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNS Kings T-Shirt Form</title>
    <link rel="icon" type="image/png" href="./mnsKings.png">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <section class="neon-card">
        <div class="logo-wrap">
            <img src="./mnsKings.png" alt="MNS Kings Logo">
        </div>
        <h1>MNS Kings T-Shirt Form</h1>
        <p class="subtitle">Please fill all details correctly.</p>

        <form id="mnsKingsForm" novalidate>
            <div class="field">
                <label for="playerName">Player Name</label>
                <input type="text" id="playerName" name="playerName" placeholder="Enter player name" maxlength="50" autocomplete="off" required>
                <div class="error" id="playerNameError"></div>
            </div>

            <div class="field">
                <label for="phoneNumber">Phone Number</label>
                <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="10-digit phone number" maxlength="10" required>
                <div class="error" id="phoneNumberError"></div>
            </div>

            <div class="field">
                <label for="nameOnTshirt">Name on T-Shirt</label>
                <input type="text" id="nameOnTshirt" name="nameOnTshirt" placeholder="Print name on jersey" maxlength="15" required>
                <div class="error" id="nameOnTshirtError"></div>
            </div>

            <div class="field">
                <label for="tshirtSize">T-Shirt Size</label>
                <select id="tshirtSize" name="tshirtSize" required>
                    <option value="">Select size</option>
                    <option value="36/S">36/S</option>
                    <option value="38/M">38/M</option>
                    <option value="40/L">40/L</option>
                    <option value="42/XL">42/XL</option>
                    <option value="44/XXL">44/XXL</option>
                    <option value="46/3XL">46/3XL</option>
                    <option value="48/4XL">48/4XL</option>
                </select>
                <div class="error" id="tshirtSizeError"></div>
            </div>

            <div class="field">
                <label for="numberOnBack">Number on Back</label>
                <input type="text" id="numberOnBack" name="numberOnBack" placeholder="e.g. 001, 07, 700" inputmode="numeric" maxlength="3" autocomplete="off" required>
                <div class="error" id="numberOnBackError"></div>
            </div>

            <div class="field">
                <label for="sleeveLength">Sleeve Length</label>
                <select id="sleeveLength" name="sleeveLength" required>
                    <option value="">Select sleeve length</option>
                    <option value="Half Sleeve">Half Sleeve</option>
                    <option value="Full Sleeve">Full Sleeve</option>
                </select>
                <div class="error" id="sleeveLengthError"></div>
            </div>

            <div class="actions">
                <button id="submitBtn" type="submit">Submit Entry</button>
            </div>
            <div class="status" id="statusMessage"></div>
        </form>
    </section>
    <script src="./script.js"></script>
</body>
</html>
